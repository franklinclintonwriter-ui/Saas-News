      <title>Phulpur24</title>
      <script>
        (() => {
          try {
            const mode = localStorage.getItem('phulpur24_theme_mode') || 'system';
            const isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
            document.documentElement.dataset.themeMode = mode;
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
          } catch {
            document.documentElement.dataset.themeMode = 'system';
          }
        })();
      </script>
      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }
        #initial-splash {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          background: #F8FAFC;
          color: #0F172A;
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          z-index: 9999;
        }
        #initial-splash .ring {
          width: 40px;
          height: 40px;
          border: 3px solid #CBD5F5;
          border-top-color: #194890;
          border-radius: 50%;
          animation: splash-spin 0.9s linear infinite;
        }
        #initial-splash p { margin: 0; font-size: 13px; font-weight: 600; }
        #initial-splash small { color: #6B7280; font-size: 12px; }
        @keyframes splash-spin { to { transform: rotate(360deg); } }
        html.dark #initial-splash { background: #0B1220; color: #E2E8F0; }
        html.dark #initial-splash small { color: #94A3B8; }
      </style>
    </head>
